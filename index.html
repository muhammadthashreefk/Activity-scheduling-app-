<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Activity Hub</title>
    <style>
        :root {
            --bg-color: #E6E8EA;
            --container-bg: #DDE0E2;
            --green-btn: #8CA98F;
            --text-main: #4A4A4A;
        }
        body {
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color);
            margin: 0; padding: 20px; display: flex; justify-content: center;
        }
        .container {
            width: 100%; max-width: 500px; background-color: var(--container-bg);
            padding: 25px; border-radius: 25px; margin-top: 20px;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .app-title { font-size: 24px; color: var(--text-main); margin: 0; }
        .lang-select { padding: 5px; border-radius: 8px; border: 1px solid #ccc; background: white; }
        
        .add-bar {
            background-color: var(--green-btn); color: var(--text-main);
            padding: 15px; border-radius: 20px; display: flex; justify-content: center;
            align-items: center; cursor: pointer; margin-bottom: 20px; font-weight: bold;
            font-size: 18px;
        }
        .activity-item {
            background: white; margin-bottom: 12px; padding: 15px;
            border-radius: 20px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid #ccc;
        }
        .left { display: flex; flex-direction: column; gap: 5px; }
        .activity-info { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 500; }
        .time-tag { font-size: 13px; color: #666; background: #eee; padding: 2px 8px; border-radius: 10px; width: fit-content; }
        
        .right { display: flex; align-items: center; gap: 10px; color: var(--text-main); }
        .delete-icon { color: #8F6A6D; cursor: pointer; font-size: 20px; }
        .icon-btn { cursor: pointer; font-size: 18px; transition: 0.3s; }
        .inactive { opacity: 0.3; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <select class="lang-select" id="lang" onchange="updateLang()">
            <option value="ml">മലയാളം</option>
            <option value="en">English</option>
            <option value="ar">العربية</option>
        </select>
        <h1 class="app-title" id="title">Activity Hub</h1>
        <span>⚙️</span>
    </div>

    <div class="add-bar" onclick="add()" id="addTxt">
        പുതിയ പ്രവർത്തനം ചേർക്കുക +
    </div>

    <div id="list">
        <div class="activity-item">
            <div class="left">
                <div class="activity-info"><span>📖</span> <span>വായന</span></div>
                <div class="time-tag">08:00 AM</div>
            </div>
            <div class="right">
                <span class="icon-btn" onclick="this.classList.toggle('inactive')">🔔</span>
                <span class="icon-btn" onclick="this.classList.toggle('inactive')">🔊</span>
                <span class="delete-icon" onclick="deleteItem(this)">🗑️</span>
            </div>
        </div>
    </div>
</div>

<script>
    const dictionary = {
        ml: { title: "Activity Hub", add: "പുതിയ പ്രവർത്തനം ചേർക്കുക +", p1: "പ്രവർത്തനം:", p2: "സമയം (ഉദാ: 10:00 AM):", p3: "ഇമോജി:", del: "ഇത് ഒഴിവാക്കട്ടെ?" },
        en: { title: "Activity Hub", add: "Add New Activity +", p1: "Activity:", p2: "Time (e.g. 10:00 AM):", p3: "Emoji:", del: "Remove this activity?" },
        ar: { title: "مركز النشاط", add: "+ إضافة نشاط جديد", p1: "النشاط:", p2: "الوقت:", p3: "رمز تعبيري:", del: "هل تريد حذف هذا؟" }
    };

    function updateLang() {
        let l = document.getElementById('lang').value;
        document.getElementById('title').innerText = dictionary[l].title;
        document.getElementById('addTxt').innerText = dictionary[l].add;
        document.body.style.direction = (l === 'ar') ? 'rtl' : 'ltr';
    }

    function add() {
        let l = document.getElementById('lang').value;
        let n = prompt(dictionary[l].p1);
        if(!n) return;
        let t = prompt(dictionary[l].p2, "09:00 AM");
        let i = prompt(dictionary[l].p3, "📝");

        let div = document.createElement('div');
        div.className = 'activity-item';
        div.innerHTML = `
            <div class="left">
                <div class="activity-info"><span>${i}</span> <span>${n}</span></div>
                <div class="time-tag">${t}</div>
            </div>
            <div class="right">
                <span class="icon-btn" onclick="this.classList.toggle('inactive')">🔔</span>
                <span class="icon-btn" onclick="this.classList.toggle('inactive')">🔊</span>
                <span class="delete-icon" onclick="deleteItem(this)">🗑️</span>
            </div>`;
        document.getElementById('list').appendChild(div);
    }

    function deleteItem(btn) {
        let l = document.getElementById('lang').value;
        if(confirm(dictionary[l].del)) {
            btn.closest('.activity-item').remove();
        }
    }
</script>
</body>
</html>
