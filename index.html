<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Activity Hub</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg-color: #e2e8f0; --card-bg: #ffffff; --green-btn: #84a58d; --text-color: #4a4a4a; }
        body { font-family: sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding: 20px; color: var(--text-color); }
        .container { width: 100%; max-width: 500px; background: #f1f5f9; border-radius: 30px; padding: 20px; min-height: 500px; }
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .add-activity-btn { background-color: var(--green-btn); color: #3d4a3e; width: 100%; padding: 20px; border-radius: 20px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 15px; text-align: right; }
        .activity-card { background: var(--card-bg); border-radius: 20px; padding: 15px; display: flex; align-items: center; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .activity-info { flex-grow: 1; margin-left: 15px; }
        .activity-name { font-weight: bold; display: block; }
        .activity-time { font-size: 12px; color: #888; }
        .delete-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #cc7a7a; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">⚙️ <h1>Activity Hub</h1></div>
    <button class="add-activity-btn" onclick="addActivity()">പുതിയ പ്രവർത്തനം ചേർക്കുക +</button>
    <div id="activityList"></div>
</div>

<script>
    // പേജ് ലോഡ് ആകുമ്പോൾ ഡാറ്റ കാണിക്കാൻ
    window.onload = function() {
        const saved = JSON.parse(localStorage.getItem('myActivities')) || [];
        saved.forEach(act => renderActivity(act.name, act.time));
    };

    function addActivity() {
        const name = prompt("പ്രവർത്തനത്തിന്റെ പേര് നൽകുക:");
        if (name) {
            const time = prompt("സമയം നൽകുക (ഉദാ: 10:00 AM):", "10:00 AM");
            renderActivity(name, time);
            saveToLocal(name, time);
        }
    }

    function renderActivity(name, time) {
        const list = document.getElementById('activityList');
        const div = document.createElement('div');
        div.className = 'activity-card';
        div.innerHTML = `
            <span>✨</span>
            <div class="activity-info">
                <span class="activity-name">${name}</span>
                <span class="activity-time">Time: ${time}</span>
            </div>
            <button class="delete-btn" onclick="removeActivity('${name}', this)">🗑️</button>
        `;
        list.appendChild(div);
    }

    function saveToLocal(name, time) {
        let activities = JSON.parse(localStorage.getItem('myActivities')) || [];
        activities.push({name, time});
        localStorage.setItem('myActivities', JSON.stringify(activities));
    }

    function removeActivity(name, btn) {
        let activities = JSON.parse(localStorage.getItem('myActivities')) || [];
        activities = activities.filter(a => a.name !== name);
        localStorage.setItem('myActivities', JSON.stringify(activities));
        btn.parentElement.remove();
    }
</script>
</body>
</html>
