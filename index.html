<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Activity Hub</title>
    <style>
        :root {
            --bg-color: #E6E8EA;
            --container-bg: #DDE0E2;
            --green-btn: #8CA98F;
            --text-main: #4A4A4A;
        }
        body {
            font-family: sans-serif; background-color: var(--bg-color);
            margin: 0; padding: 20px; display: flex; justify-content: center;
        }
        .container {
            width: 100%; max-width: 500px; background-color: var(--container-bg);
            padding: 25px; border-radius: 25px; margin-top: 20px;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .settings-btn { background: white; border: 1px solid #ccc; padding: 10px; border-radius: 12px; cursor: pointer; font-size: 20px; }
        .app-title { font-size: 24px; color: var(--text-main); margin: 0; }
        .lang-select { padding: 5px; border-radius: 5px; border: 1px solid #ccc; }
        
        .add-bar {
            background-color: var(--green-btn); color: var(--text-main);
            padding: 15px; border-radius: 20px; display: flex; justify-content: flex-end;
            align-items: center; cursor: pointer; margin-bottom: 20px; font-weight: bold;
        }
        .activity-item {
            background: white; margin-bottom: 12px; padding: 15px;
            border-radius: 20px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid #ccc;
        }
        .left { display: flex; align-items: center; gap: 15px; font-size: 18px; font-weight: 500; }
        .right { display: flex; align-items: center; gap: 10px; color: var(--text-main); }
        .everyday { font-size: 14px; display: flex; align-items: center; gap: 3px; }
        .delete-icon { color: #8F6A6D; cursor: pointer; font-size: 20px; }
        .active-icon { opacity: 1; cursor: pointer; }
        .inactive-icon { opacity: 0.3; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <button class="settings-btn" onclick="alert('Settings feature coming soon!')">⚙️</button>
        <h1 class="app-title" id="title">Activity Hub</h1>
        <select class="lang-select" id="lang" onchange="updateLang()">
            <option value="ml">ML</option>
            <option value="en">EN</option>
        </select>
    </div>

    <div class="add-bar" onclick="add()" id="addTxt">
        പുതിയ പ്രവർത്തനം ചേർക്കുക +
    </div>

    <div id="list">
        <div class="activity-item">
            <div class="left"><span>📖</span> <span>വായന</span></div>
            <div class="right">
                <span class="active-icon" onclick="this.className=(this.className=='active-icon'?'inactive-icon':'active-icon')">🔔</span>
                <span class="active-icon" onclick="this.className=(this.className=='active-icon'?'inactive-icon':'active-icon')">🔊</span>
                <div class="everyday">everyday <span>∨</span></div>
                <span class="delete-icon" onclick="this.closest('.activity-item').remove()">🗑️</span>
            </div>
        </div>
    </div>
</div>

<script>
    const dictionary = {
        ml: { title: "Activity Hub", add: "പുതിയ പ്രവർത്തനം ചേർക്കുക +", p1: "പ്രവർത്തനം:", p2: "ഇമോജി:" },
        en: { title: "Activity Hub", add: "Add New Activity +", p1: "Activity Name:", p2: "Emoji:" }
    };

    function updateLang() {
        let l = document.getElementById('lang').value;
        document.getElementById('title').innerText = dictionary[l].title;
        document.getElementById('addTxt').innerText = dictionary[l].add;
    }

    function add() {
        let l = document.getElementById('lang').value;
        let n = prompt(dictionary[l].p1);
        if(!n) return;
        let i = prompt(dictionary[l].p2, "📝");

        let div = document.createElement('div');
        div.className = 'activity-item';
        div.innerHTML = `
            <div class="left"><span>${i}</span> <span>${n}</span></div>
            <div class="right">
                <span class="active-icon" onclick="this.className=(this.className=='active-icon'?'inactive-icon':'active-icon')">🔔</span>
                <span class="active-icon" onclick="this.className=(this.className=='active-icon'?'inactive-icon':'active-icon')">🔊</span>
                <div class="everyday">everyday <span>∨</span></div>
                <span class="delete-icon" onclick="this.closest('.activity-item').remove()">🗑️</span>
            </div>`;
        document.getElementById('list').appendChild(div);
    }
</script>
</body>
</html>
